name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: python -m pip install -e "./apps/backend[dev]"
      - run: python -m ruff check apps/backend
      - run: python -m pytest apps/backend/tests -q
      - run: corepack pnpm --filter @dualcode/desktop typecheck
      - run: corepack pnpm --filter @dualcode/desktop lint
      - run: corepack pnpm --filter @dualcode/desktop test
